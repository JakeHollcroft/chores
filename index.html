<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chores TV</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

<header>
    <h1 id="dateHeader"></h1>
    <div class="subtitle">Weekly Chore Tracker</div>

    <div class="day-filter">
        <select id="dayFilter" onchange="render()">
            <option value="week">This Week</option>
            <option value="0">Monday</option>
            <option value="1">Tuesday</option>
            <option value="2">Wednesday</option>
            <option value="3">Thursday</option>
            <option value="4">Friday</option>
            <option value="5">Saturday</option>
            <option value="6">Sunday</option>
        </select>
    </div>
</header>

<!-- PROGRESS SECTION -->
<div class="progress-section">

    <!-- DAILY -->
    <div class="progress-card">
        <div class="progress-header">
            Daily Progress:
            <span id="dailyProgressText">0 / 0 (0%)</span>
        </div>
        <div class="progress-bar">
            <div id="dailyProgressFill" class="progress-fill"></div>
        </div>
    </div>

    <!-- WEEKLY -->
    <div class="progress-card">
        <div class="progress-header">
            Weekly Progress:
            <span id="weeklyProgressText">0 / 0 (0%)</span>
        </div>
        <div class="progress-bar">
            <div id="weeklyProgressFill" class="progress-fill"></div>
        </div>
    </div>

</div>

<div class="columns">
    <div class="person-column">
        <h2>Jake's Chores</h2>
        <div id="taskList"></div>
    </div>
</div>

<div class="form-card">
    <input id="taskTitle" placeholder="Task name">

    <select id="weekday">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
        <option value="5">Saturday</option>
        <option value="6">Sunday</option>
    </select>

    <button onclick="addTask()">Add Task</button>
</div>

</div>

<script>

/* =========================
   DATE HEADER
========================= */

const today = new Date();

document.getElementById("dateHeader").innerText =
    today.toLocaleDateString(undefined,{
        weekday:"long",
        month:"long",
        day:"numeric"
    });

/* =========================
   STORAGE
========================= */

function loadTasks(){
    return JSON.parse(localStorage.getItem("tasks")) || [];
}

function saveTasks(tasks){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

/* =========================
   WEEK LOGIC
========================= */

function getMonday(date){
    const d = new Date(date);
    const day = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - day);
    return d.toISOString().split("T")[0];
}

const monday = getMonday(today);
const todayWeekday = (today.getDay() + 6) % 7;

/* =========================
   ADD TASK
========================= */

function addTask(){

    const title = document.getElementById("taskTitle").value;
    if(!title) return;

    const weekday = parseInt(document.getElementById("weekday").value);

    const tasks = loadTasks();

    tasks.push({
        id: Date.now(),
        title,
        weekday,
        completions: [],
        completionTimes: {}
    });

    saveTasks(tasks);
    document.getElementById("taskTitle").value = "";
    render();
}

/* =========================
   COMPLETE TASK
========================= */

function completeTask(id){

    const tasks = loadTasks();

    tasks.forEach(task=>{
        if(task.id === id){
            if(!task.completions.includes(monday)){
                task.completions.push(monday);
                task.completionTimes[monday] = new Date().toISOString();
            }
        }
    });

    saveTasks(tasks);
    render();
}

/* =========================
   DELETE
========================= */

function deleteTask(id){
    saveTasks(loadTasks().filter(t=>t.id !== id));
    render();
}

/* =========================
   EDIT
========================= */

function editTask(id){

    const tasks = loadTasks();
    const task = tasks.find(t => t.id === id);
    if(!task) return;

    const card = event.target.closest(".task-card");

    const weekdayNames = [
        "Monday","Tuesday","Wednesday",
        "Thursday","Friday","Saturday","Sunday"
    ];

    card.innerHTML = `
        <div class="edit-form">
            <input id="editTitle${id}" value="${task.title}">
            <select id="editWeekday${id}">
                ${weekdayNames.map((day,i)=>
                    `<option value="${i}" ${task.weekday===i?"selected":""}>${day}</option>`
                ).join("")}
            </select>
            <div class="edit-buttons">
                <button onclick="saveEdit(${id})" class="complete">Save</button>
                <button onclick="render()" class="delete">Cancel</button>
            </div>
        </div>
    `;
}

function saveEdit(id){

    const tasks = loadTasks();
    const task = tasks.find(t => t.id === id);
    if(!task) return;

    task.title =
        document.getElementById(`editTitle${id}`).value;

    task.weekday =
        parseInt(document.getElementById(`editWeekday${id}`).value);

    saveTasks(tasks);
    render();
}

/* =========================
   CREATE CARD
========================= */

function createCard(task){

    const completed = task.completions.includes(monday);

    let completionText = "";

    if(completed && task.completionTimes[monday]){

        const time = new Date(task.completionTimes[monday]);

        const weekday = time.toLocaleDateString(undefined,{
            weekday:"long"
        });

        const clock = time.toLocaleTimeString([],{
            hour:"numeric",
            minute:"2-digit"
        });

        completionText =
            `<span class="done-label animated">
                Completed ${weekday} at ${clock} ✓
            </span>`;
    }

    const card = document.createElement("div");

    card.className =
        "task-card" + (completed ? " completed" : "");

    card.innerHTML = `
        <div>
            <h3>${task.title}</h3>
        </div>
        <div class="task-actions">
            ${
                completed
                ? completionText
                : `<button class="complete" onclick="completeTask(${task.id})">Complete</button>`
            }
            <button class="edit" onclick="editTask(${task.id})">✏️</button>
            <button class="delete" onclick="deleteTask(${task.id})">Delete</button>
        </div>
    `;

    return card;
}

/* =========================
   RENDER
========================= */

function render(){

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    const filterValue =
        document.getElementById("dayFilter").value;

    const tasks = loadTasks().filter(task => {

        if(filterValue === "week"){
            return true;
        } else {
            return task.weekday === parseInt(filterValue);
        }
    });

    tasks.sort((a,b) => {

        const aDone = a.completions.includes(monday);
        const bDone = b.completions.includes(monday);

        if(aDone !== bDone) return aDone ? 1 : -1;

        return a.weekday - b.weekday;
    });

    tasks.forEach(task=>{
        list.appendChild(createCard(task));
    });

    updateProgress(filterValue);
}

render();

/* =========================
   PROGRESS CALCULATION
========================= */

function updateProgress(filterValue){

    const tasks = loadTasks();

    /* WEEKLY */

    const weeklyTotal = tasks.length;

    const weeklyCompleted = tasks.filter(t =>
        t.completions.includes(monday)
    ).length;

    const weeklyPercent =
        weeklyTotal === 0
        ? 0
        : Math.round((weeklyCompleted / weeklyTotal) * 100);

    document.getElementById("weeklyProgressText").innerText =
        `${weeklyCompleted} / ${weeklyTotal} (${weeklyPercent}%)`;

    document.getElementById("weeklyProgressFill").style.width =
        weeklyPercent + "%";


    /* DAILY */

    let dayIndex;

    if(filterValue === "week"){
        dayIndex = todayWeekday; // default to today
    } else {
        dayIndex = parseInt(filterValue);
    }

    const dailyTasks =
        tasks.filter(t => t.weekday === dayIndex);

    const dailyTotal = dailyTasks.length;

    const dailyCompleted =
        dailyTasks.filter(t =>
            t.completions.includes(monday)
        ).length;

    const dailyPercent =
        dailyTotal === 0
        ? 0
        : Math.round((dailyCompleted / dailyTotal) * 100);

    document.getElementById("dailyProgressText").innerText =
        `${dailyCompleted} / ${dailyTotal} (${dailyPercent}%)`;

    document.getElementById("dailyProgressFill").style.width =
        dailyPercent + "%";
}

</script>

</body>
</html>
